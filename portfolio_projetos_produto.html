<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muvstok - Portifólio de Projetos - Produto</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="h-screen flex flex-col overflow-x-hidden overflow-y-auto lg:overflow-hidden">

    <header class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-3 pb-3 border-b border-zinc-800/50 flex-shrink-0 gap-4 lg:gap-0">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8">
                <svg viewBox="0 0 100 100" class="w-full h-full"><path d="M50 5 L90 27.5 L90 72.5 L50 95 L10 72.5 L10 27.5 Z" fill="none" stroke="white" stroke-width="6"/><path d="M50 20 L75 35 L75 65 L50 80 L25 65 L25 35 Z" fill="none" stroke="#FF5C39" stroke-width="2"/></svg>
            </div>
            <div>
                <h1 class="text-md font-black uppercase tracking-tighter leading-none">Portifólio de Projetos <span class="text-zinc-500 font-normal">- Produto</span></h1>
                <p class="label-xs mt-0.5">Portfólio Estratégico | Global Sprint 07</p>
            </div>
        </div>
        
        <div class="header-stats w-full lg:w-auto lg:min-w-[400px]">
            <div class="stat-cell text-center"><p class="label-xs">Total Projetos</p><p class="text-md font-black" id="stat-total">0</p></div>
            <div class="stat-cell text-center"><p class="label-xs">Ativos</p><p class="text-md font-black text-[#FF5C39]" id="stat-ativos">0</p></div>
            <div class="stat-cell text-center"><p class="label-xs">Discovery</p><p class="text-md font-black text-zinc-400" id="stat-discovery">0</p></div>
        </div>
    </header>

    <main class="flex-1 min-h-0 flex flex-col lg:grid lg:grid-cols-12 gap-4 pb-2">
        <div class="col-span-12 lg:col-span-9 flex flex-col lg:min-h-0 lg:h-full">
            <div class="legend-container flex-shrink-0">
                <div class="legend-item"><div class="w-3 h-0.5 bg-[#10B981]"></div> Check</div>
                <div class="legend-item"><div class="w-3 h-0.5 bg-[#F59E0B]"></div> Transbordo</div>
                <div class="legend-item"><div class="w-3 h-0.5 bg-[#7F1D1D]"></div> Risco</div>
            </div>

            <div id="projects-container" class="flex-1 lg:overflow-y-auto custom-scrollbar pr-2 mb-2 lg:min-h-0 min-h-[400px]"></div>
        </div>

        <div class="col-span-12 lg:col-span-3 space-y-3 flex flex-col h-full lg:overflow-y-auto custom-scrollbar pr-2 mt-4 lg:mt-0">
            <div class="bg-zinc-900/50 border border-zinc-800 p-3 rounded-xl flex-shrink-0">
                <h2 class="label-xs mb-3">Esforço Estimado</h2>
                <div style="height: 160px;"><canvas id="radarEff"></canvas></div>
            </div>

            <div class="bg-zinc-900/50 border border-zinc-800 p-3 rounded-xl flex-shrink-0">
                <h2 class="label-xs mb-3 flex items-center justify-between">
                    Volume Mensal
                    <span class="text-[7px] bg-orange-500/10 text-orange-500 px-1.5 rounded">TIME BI</span>
                </h2>
                <div style="height: 140px;"><canvas id="barProjectsBI"></canvas></div>
            </div>

            <div class="bg-zinc-900/50 border border-zinc-800 p-3 rounded-xl flex-shrink-0">
                <h2 class="label-xs mb-2 flex items-center gap-2">
                    <i class="fas fa-exclamation-triangle text-orange-500"></i>
                    Bloqueios Críticos
                </h2>
                <div class="space-y-2">
                    <div class="p-2.5 border-l-2 border-orange-500 bg-orange-500/5 rounded">
                        <p class="text-[8px] font-black text-orange-500 uppercase mb-1">DMS INTEGRAÇÃO</p>
                        <p class="text-[9px] font-bold leading-tight text-zinc-300">
                            Atraso na comunicação com DMS pode impactar no deadline de vários projetos.
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
